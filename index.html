<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Higher Stairs</title>
  <style>
    :root {
      --bg: #3e4d74; --panel: #2a3553; --text: #f1f3fa; --muted: #c4cfe6;
      --accent: #5b9bd5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; font: 16px/1.55 -apple-system, BlinkMacSystemFont,
        "Segoe UI", Roboto, sans-serif; color: var(--text);
      background: linear-gradient(180deg, var(--bg) 0%, var(--panel) 100%);
      display: grid; place-items: center; padding: 32px;
    }
    main {
      max-width: 560px; width: 100%; padding: 40px; background: rgba(0,0,0,.18);
      border-radius: 18px; backdrop-filter: blur(6px);
    }
    h1 { font-size: 44px; letter-spacing: 2px; margin: 0 0 8px; }
    p.lead { color: var(--muted); margin: 0 0 28px; font-size: 18px; }
    a.btn {
      display: block; padding: 14px 18px; margin: 10px 0; border-radius: 10px;
      background: var(--accent); color: white; text-decoration: none;
      font-weight: 600; transition: transform .1s;
    }
    a.btn.secondary { background: rgba(255,255,255,.08); }
    a.btn:hover { transform: translateY(-1px); }
    footer { color: var(--muted); font-size: 13px; margin-top: 28px; }
    footer a { color: var(--muted); }
  </style>
</head>
<body>
  <main>
    <h1>HIGHER STAIRS</h1>
    <p class="lead">Flick the ball up an endless staircase under the stars.</p>
    <a class="btn" href="support.html">Support</a>
    <footer>
      © 2026 OpenWeb · <a href="mailto:ruslanmedia.uz@gmail.com">ruslanmedia.uz@gmail.com</a>
    </footer>
  </main>
</body>
</html>
